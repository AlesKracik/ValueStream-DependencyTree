services:
  app:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-ssh-proxy}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
    env_file:
      - .env
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ssh-proxy:
    profiles:
      - ssh-proxy
    build:
      context: .
      dockerfile: Dockerfile.ssh-proxy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount the entire .ssh folder so any key can be used
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongo-data:
