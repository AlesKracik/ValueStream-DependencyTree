services:
  app:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-ssh-proxy}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
    env_file:
      - .env
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ssh-proxy:
    image: alpine/ssh
    restart: unless-stopped
    entrypoint: /bin/sh -c
    command: >
      "if [ -z \"$$SSH_HOST\" ]; then
        echo 'SSH_HOST not set. Sidecar tunnel is DISABLED. (Scenario A or C)';
        sleep infinity;
      else
        echo 'Starting SOCKS5 Sidecar tunnel to $$SSH_HOST...';
        ssh -o StrictHostKeyChecking=no -o ExitOnForwardFailure=yes 
        -D 0.0.0.0:1080 -N -i /root/.ssh/id_rsa $$SSH_USER@$$SSH_HOST;
      fi"
    environment:
      - SSH_USER=${SSH_USER}
      - SSH_HOST=${SSH_HOST}
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh/id_rsa}:/root/.ssh/id_rsa:ro
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongo-data:
