services:
  web-client:
    build:
      context: .
      dockerfile: web-client/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      - NODE_ENV=development
      # Tell Vite proxy to forward /api requests to the backend container
      - VITE_PROXY_TARGET=http://backend:${PORT:-4000}
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - ADMIN_SECRET=${ADMIN_SECRET}
      # Proxy configurations for SSH tunnels
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-ssh-proxy}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
      - GLEAN_REDIRECT_BASE_URL=${GLEAN_REDIRECT_BASE_URL:-http://localhost:4000}
    env_file:
      - .env
    volumes:
      # Map AWS credentials if needed locally
      - ~/.aws:/root/.aws
      # Persist settings and encrypted secrets across container rebuilds.
      # IMPORTANT: Both files must exist on the host before starting the container.
      # Docker creates directories for missing bind-mount targets.
      # Run: touch backend/settings.secrets.enc   (if it doesn't exist yet)
      - ./backend/settings.json:/app/backend/settings.json
      - ./backend/settings.secrets.enc:/app/backend/settings.secrets.enc
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ssh-proxy:
    profiles:
      - ssh-proxy
    build:
      context: .
      dockerfile: Dockerfile.ssh-proxy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount the entire .ssh folder so any key can be used
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongo-data:
