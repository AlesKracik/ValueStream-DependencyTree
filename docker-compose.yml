services:
  app:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mongo-data:
