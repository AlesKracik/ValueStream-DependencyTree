apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-settings-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: valuestream
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/aleskracik/valuestream-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4000
        env:
        - name: NODE_ENV
          value: "production"
        - name: HOST
          value: "0.0.0.0"
        - name: ADMIN_SECRET
          valueFrom:
            secretKeyRef:
              name: valuestream-secrets
              key: ADMIN_SECRET
        # SecretManager env-var overrides (optional — uncomment to use EnvProvider)
        # When set, secrets are read from env vars instead of the encrypted file.
        # - name: VSDT_SECRET_PERSISTENCE_MONGO_APP_URI
        #   valueFrom:
        #     secretKeyRef:
        #       name: valuestream-secrets
        #       key: VSDT_SECRET_PERSISTENCE_MONGO_APP_URI
        # Add proxy configuration environments if SOCKS proxy is used in K8s
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 5
          periodSeconds: 10
        volumeMounts:
        - name: settings
          mountPath: /app/backend/settings.json
          subPath: settings.json
        - name: settings
          mountPath: /app/backend/settings.secrets.enc
          subPath: settings.secrets.enc
      volumes:
      - name: settings
        persistentVolumeClaim:
          claimName: backend-settings-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  ports:
  - port: 4000
    targetPort: 4000
  selector:
    app: backend
