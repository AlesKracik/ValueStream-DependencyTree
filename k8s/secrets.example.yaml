apiVersion: v1
kind: Secret
metadata:
  name: valuestream-secrets
type: Opaque
stringData:
  ADMIN_SECRET: "your_super_secret_admin_password_here"
  # --- Optional: SecretManager env-var overrides (VSDT_SECRET_ prefix) ---
  # When these are set, the backend uses EnvProvider instead of the encrypted file.
  # Convert dot-paths to uppercase with underscores:
  #   persistence.mongo.app.uri → VSDT_SECRET_PERSISTENCE_MONGO_APP_URI
  # VSDT_SECRET_PERSISTENCE_MONGO_APP_URI: "mongodb+srv://user:pass@cluster/db"
  # VSDT_SECRET_JIRA_API_TOKEN: "your_jira_pat"
  # VSDT_SECRET_AI_API_KEY: "sk-..."
