services:
  web-client:
    build:
      context: .
      dockerfile: web-client/Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - PORT=${PORT:-4000}
    networks:
      - app-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${PORT:-4000}:${PORT:-4000}"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-ssh-proxy}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
    env_file:
      - .env
    volumes:
      - ~/.aws:/root/.aws
      # Persist settings and encrypted secrets across container rebuilds.
      # IMPORTANT: Both files must exist on the host before starting the container.
      # Docker creates directories for missing bind-mount targets.
      # Run: touch backend/settings.secrets.enc   (if it doesn't exist yet)
      - ./backend/settings.json:/app/backend/settings.json
      - ./backend/settings.secrets.enc:/app/backend/settings.secrets.enc
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ssh-proxy:
    profiles:
      - ssh-proxy
    build:
      context: .
      dockerfile: Dockerfile.ssh-proxy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongo-data:
