services:
  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - ADMIN_SECRET=${ADMIN_SECRET}
      - SOCKS_PROXY_HOST=${SOCKS_PROXY_HOST:-ssh-proxy}
      - SOCKS_PROXY_PORT=${SOCKS_PROXY_PORT:-1080}
    env_file:
      - .env
    volumes:
      - ~/.aws:/root/.aws:ro
    networks:
      - app-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ssh-proxy:
    profiles:
      - ssh-proxy
    build:
      context: .
      dockerfile: Dockerfile.ssh-proxy
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ${SSH_DIR:-~/.ssh}:/root/.ssh:ro
    networks:
      - app-network

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1400

volumes:
  mongo-data:
